output_dir: checkpoints/lora_cfg_10000

seed: 42

accelerator: gpu
devices: 1
strategy: auto          # <-- change from ddp

precision: bf16-mixed

epochs: 3

batch_size: 4
gradient_accumulation_steps: 4

num_workers: 4

learning_rate: 1e-4
weight_decay: 0.01

warmup_steps: 15
max_grad_norm: 1.0

logging_steps: 10
log_every_n_steps: 10

save_top_k: 3
monitor: val/loss
mode: min

check_val_every_n_epoch: 1

dropout_prob: 0.2

conditioning:
  mode: random