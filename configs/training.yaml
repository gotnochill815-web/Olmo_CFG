seed: 42

epochs: 1

batch_size: 1

gradient_accumulation_steps: 16

learning_rate: 2e-4

weight_decay: 0.01

warmup_ratio: 0.03

logging_steps: 10

save_steps: 500

save_total_limit: 2

eval_steps: 500

evaluation_strategy: steps

dropout_probability: 0.2

output_dir: checkpoints/